<!DOCTYPE html>
<html>
    <head>
        <title>Navigation Bar Variations</title>
        <style>
            body{
                font-family: Arial, Helvetica, sans-serif;
                margin: 0;
                padding: 20px;
                background-color: lightseagreen;
                color: bisque;
            }
            .nav-container{
                margin-bottom: 40px;
            }
            h2{
                margin-bottom: 20px;
            }
            .nav-1{
                border: 2px solid red;
                background-color: blanchedalmond;
                padding: 5px;
            }
            .nav-1 ul{
                list-style-type: none;
                display: flex;
                justify-content: space-around;
            }
            .nav-1 li{
                display: inline;
            }
            .nav-1 a {
                text-decoration: none;
                background-color: lightcoral;
                padding: 5px 10px;
                position: relative;
            }
            .nav-1 a::after{
                content: "";
                position: absolute;
                height: 2px;
                width: 100%;
                bottom: 0;
                left: 0;
                background-color: blue;
                transform: scaleX(0);
                transition: transform 0.3s ease-in-out;
            }
            .nav-1 a:hover::after{
                transform: scaleX(1);
            }
            .nav-1 .login-btn{
                background-color: aqua;
                padding: 5px 10px;
                border: none;
                border-radius: 10px;
                cursor: pointer;
            }
            .nav-2{
                border: 2px solid red;
                background-color: blanchedalmond;
                padding: 5px;
            }
            .nav-2 ul{
                list-style-type: none;
                display: flex;
                justify-content: space-around;
            }
            .nav-2 li{
                display: inline;
            }
            .nav-2 a {
                text-decoration: none;
                background-color: lightcoral;
                padding: 5px 10px;
                position: relative;
            }
            .nav-2 a::after{
                content: "";

                height: 2px;
                width: 100%;
                bottom: 0;
                left: 0;
                background-color: blue;
                transform: scaleX(0);
                transition: transform 0.3s ease-in-out;
            }
            .nav-2 a:hover::after{
                transform: scaleX(1);
            }
            .nav-2 .login-btn{
                background-color: aqua;
                padding: 5px 10px;
                border: none;
                border-radius: 10px;
                cursor: pointer;
            }
            .nav-3{
                border: 2px solid red;
                background-color: blanchedalmond;
                padding: 5px;
            }
            .nav-3 ul{

            .nav-3 li{

            .nav-3 .login-btn{

                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <div class="nav-container">
            <h2>Variation 1: Horizontal with underline effect</h2>
            <nav class="nav-1">
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">About us</a></li>
                    <li><a href="#">Products</a></li>
                    <li><button class="login-btn">LOGIN</button></li>
                </ul>
            </nav>
        </div>
        <div class="nav-container">
            <h2>Variation 2: Vertical with hover effect</h2>
            <nav class="nav-2">
